{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h3 class="mb-0">Edit Product</h3>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('product_bp.edit_product', product_id=product._id) }}" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label for="name" class="form-label">Product Name *</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ product.name }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="3">{{ product.description }}</textarea>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="price" class="form-label">Price *</label>
                                <div class="input-group">
                                    <span class="input-group-text">$</span>
                                    <input type="number" step="0.01" min="0" class="form-control" id="price" name="price" value="{{ '%.2f'|format(product.price) }}" required>
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="stock" class="form-label">Stock Quantity</label>
                                <input type="number" min="0" class="form-control" id="stock" name="stock" value="{{ product.stock }}">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="image_url" class="form-label">Image URL</label>
                            <input type="url" class="form-control" id="image_url" name="image_url" value="{{ product.image_url }}" placeholder="https://example.com/image.jpg">
                        </div>
                        
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="is_active" name="is_active" {% if product.is_active %}checked{% endif %}>
                            <label class="form-check-label" for="is_active">Product is active (visible in store)</label>
                        </div>
                        
                        <div class="d-grid gap-2 d-md-flex justify-content-md-between">
                            <a href="{{ url_for('product_bp.retailer_dashboard') }}" class="btn btn-outline-secondary me-md-2">Cancel</a>
                            <div>
                                <a href="#" class="btn btn-outline-danger me-md-2" 
                                   onclick="if(confirm('Are you sure you want to delete this product?')) { 
                                       window.location.href='{{ url_for('product_bp.delete_product_action', product_id=product._id) }}' 
                                   } return false;">
                                    <i class="fas fa-trash"></i> Delete
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save"></i> Save Changes
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .card {
        border: none;
        box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
    }
    
    .card-header {
        background-color: #f8f9fa;
        border-bottom: 1px solid #e9ecef;
        padding: 1.25rem 1.5rem;
    }
    
    .card-body {
        padding: 2rem;
    }
    
    .form-label {
        font-weight: 500;
        margin-bottom: 0.5rem;
    }
    
    .btn-primary {
        background-color: #1a73e8;
        border-color: #1a73e8;
    }
    
    .btn-primary:hover {
        background-color: #1557b0;
        border-color: #1557b0;
    }
    
    .btn-outline-secondary {
        color: #5f6368;
        border-color: #dadce0;
    }
    
    .btn-outline-secondary:hover {
        background-color: #f1f3f4;
        border-color: #dadce0;
    }
    
    .btn-outline-danger {
        color: #d93025;
        border-color: #d93025;
    }
    
    .btn-outline-danger:hover {
        background-color: #fce8e6;
        border-color: #d93025;
    }
</style>
{% endblock %}
