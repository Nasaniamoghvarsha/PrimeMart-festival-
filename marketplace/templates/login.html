{% extends "base.html" %}

{% block content %}
<video autoplay muted loop class="video-background">
    <source src="{{ url_for('static', filename='videos/video.mp4') }}" type="video/mp4">
    Your browser does not support the video tag.
</video>
<div class="video-overlay"></div>
<style>
  :root {
    --pm-blue: #1e3c72;
    --pm-blue-dark: #2a5298;
    --pm-yellow: #fdd835;
    --pm-yellow-hover: #ffc107;
    --pm-card: #ffffff;
    --pm-border: #e5e7eb;
  }

  body {
    background: transparent;
    color: #fff;
    position: relative;
  }

  .login-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 120px);
    padding: 20px;
  }

  .login-box {
    width: 100%;
    max-width: 420px;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px);
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    border-radius: 14px;
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
    border: 1px solid var(--pm-border);
    padding: 36px 32px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    animation: fadeInUp 0.7s ease forwards;
    color: #0f172a;
  }

  .login-box h2 {
    margin: 0 0 10px;
    color: #0f172a;
    text-align: center;
  }

  .login-box p {
    margin: 0 0 24px;
    opacity: 0.85;
    color: #334155;
    text-align: center;
  }

  .login-box form {
    display: grid;
    gap: 12px;
  }

  .login-box input {
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #cbd5e1;
    background: #fff;
    color: #0f172a;
    transition: 0.3s;
  }

  .login-box input:focus {
    border-color: var(--pm-blue);
    box-shadow: 0 0 0 3px rgba(30, 60, 114, 0.2);
    outline: none;
  }

  .login-box button {
    padding: 12px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: 700;
    font-size: 1rem;
    background: var(--pm-yellow);
    color: #000;
    transition: 0.3s ease;
    box-shadow: 0 0 10px rgba(253, 216, 53, 0.4);
  }

  .login-box button:hover {
    background: var(--pm-yellow-hover);
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(253, 216, 53, 0.7);
  }

  .login-footer {
    margin-top: 18px;
    text-align: center;
    font-size: 14px;
    color: #334155;
  }

  .login-footer a {
    color: var(--pm-blue-dark);
    text-decoration: underline;
    font-weight: 600;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>

<div class="login-container">
  <div class="login-box">
    <h2>User Login</h2>
    <p>Welcome back! Log in to continue shopping</p>

    <form action="{{ url_for('auth_bp.login') }}" method="POST">
      <input type="email" name="email" placeholder="Your Email *" required>
      <input type="password" name="password" placeholder="Your Password *" required>
      <button type="submit">Login</button>
    </form>

    <div class="login-footer">
      <div><a href="#">Forgot Password?</a></div>
      <div style="margin-top:6px;">New here? <a href="{{ url_for('auth_bp.signup') }}">Create Account</a></div>
    </div>
  </div>
</div>
{% endblock %}
